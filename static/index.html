<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #eee; }
  #sidebar { width: 340px; min-width: 240px; display: flex; flex-direction: column; border-right: 1px solid #333; }
  #search-box { padding: 10px; background: #16213e; }
  #search { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #444; background: #0f3460; color: #eee; font-size: 14px; }
  #filter-btns { display: flex; gap: 6px; margin-top: 8px; }
  .filter-btn { flex: 1; padding: 5px; border: 1px solid #444; border-radius: 4px; background: #0f3460; color: #aaa; cursor: pointer; font-size: 12px; }
  .filter-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  #file-list { flex: 1; overflow-y: auto; }
  .file-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
  .file-item:hover { background: #0f3460; }
  .file-item.active { background: #e94560; }
  .file-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-dir { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 5px; }
  .badge-md { background: #2d6a4f; color: #95d5b2; }
  .badge-img { background: #7b2d8b; color: #e0aaff; }
  #main { flex: 1; overflow: auto; padding: 24px; background: #0d1117; }
  #content { max-width: 860px; margin: 0 auto; }
  #content img { max-width: 100%; border-radius: 8px; }
  #md-body { line-height: 1.8; }
  #md-body h1,#md-body h2,#md-body h3 { margin: 1em 0 0.5em; color: #58a6ff; }
  #md-body p { margin: 0.5em 0; }
  #md-body code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  #md-body pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
  #md-body blockquote { border-left: 4px solid #444; padding-left: 12px; color: #8b949e; }
  #md-body ul,#md-body ol { padding-left: 1.5em; margin: 0.5em 0; }
  #md-body a { color: #58a6ff; }
  #md-body hr { border-color: #333; margin: 1.5em 0; }
  #placeholder { text-align: center; color: #444; margin-top: 20vh; font-size: 18px; }
  #filepath-bar { display: none; align-items: center; gap: 10px; margin-bottom: 16px; }
  #filepath { font-size: 12px; color: #666; word-break: break-all; flex: 1; }
  #delete-btn { padding: 5px 14px; background: #c0392b; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  #delete-btn:hover { background: #e74c3c; }
  #count { padding: 6px 12px; font-size: 11px; color: #666; background: #111; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="search-box">
    <input id="search" type="text" placeholder="ファイル名で検索..." oninput="renderList()">
    <div id="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('md',this)">Markdown</button>
      <button class="filter-btn" onclick="setFilter('image',this)">Image</button>
    </div>
  </div>
  <div id="count"></div>
  <div id="file-list"></div>
</div>
<div id="main">
  <div id="content">
    <div id="placeholder">← ファイルを選んでください</div>
    <div id="filepath-bar">
      <div id="filepath"></div>
      <button id="delete-btn" onclick="deleteFile()">🗑 削除</button>
    </div>
    <div id="md-body" style="display:none"></div>
    <img id="img-view" style="display:none">
  </div>
</div>
<script>
let allFiles = [], filteredFiles = [], currentFilter = 'all', activeItem = null, currentIdx = -1;

async function init() {
  const res = await fetch('/api/files');
  allFiles = await res.json();
  renderList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  filteredFiles = allFiles.filter(f => {
    if (currentFilter !== 'all' && f.type !== currentFilter) return false;
    return f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q);
  });
  document.getElementById('count').textContent = `${filteredFiles.length} files`;
  const list = document.getElementById('file-list');
  list.innerHTML = filteredFiles.map((f,i) => `
    <div class="file-item" onclick="openByFilteredIdx(${i})" data-idx="${i}" data-path="${f.path}">
      <div class="file-name">${f.name}<span class="badge badge-${f.type}">${f.type}</span></div>
      <div class="file-dir">${f.dir}</div>
    </div>
  `).join('');
  currentIdx = -1;
}

function openByFilteredIdx(i) {
  currentIdx = i;
  const items = document.querySelectorAll('.file-item');
  if (activeItem) activeItem.classList.remove('active');
  activeItem = items[i];
  activeItem.classList.add('active');
  activeItem.scrollIntoView({ block: 'nearest' });
  openFile(allFiles.indexOf(filteredFiles[i]));
}

async function openFile(idx) {
  const f = allFiles[idx];
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('filepath-bar').style.display = 'flex';
  document.getElementById('filepath').textContent = f.path;
  document.getElementById('md-body').style.display = 'none';
  document.getElementById('img-view').style.display = 'none';

  if (f.type === 'image') {
    document.getElementById('img-view').src = `/api/file?path=${encodeURIComponent(f.path)}`;
    document.getElementById('img-view').style.display = 'block';
  } else {
    const res = await fetch(`/api/file?path=${encodeURIComponent(f.path)}`);
    const text = await res.text();
    document.getElementById('md-body').innerHTML = marked.parse(text);
    document.getElementById('md-body').style.display = 'block';
  }
}

async function deleteFile() {
  const path = document.getElementById('filepath').textContent;
  if (!path) return;
  if (!confirm(`本当に削除しますか？\n\n${path}`)) return;
  const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
  if (res.ok) {
    const nextIdx = currentIdx < filteredFiles.length - 1 ? currentIdx : currentIdx - 1;
    allFiles = allFiles.filter(f => f.path !== path);
    renderList();
    if (nextIdx >= 0 && filteredFiles.length > 0) {
      openByFilteredIdx(Math.min(nextIdx, filteredFiles.length - 1));
    } else {
      document.getElementById('placeholder').style.display = 'block';
      document.getElementById('placeholder').textContent = `✅ 削除しました: ${path.split('/').pop()}`;
      document.getElementById('filepath-bar').style.display = 'none';
      document.getElementById('md-body').style.display = 'none';
      document.getElementById('img-view').style.display = 'none';
      activeItem = null;
    }
  } else {
    alert('削除に失敗しました');
  }
}

document.addEventListener('keydown', e => {
  if (e.target.id === 'search') {
    if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveCursor(-1); }
    if (e.key === 'Enter' && currentIdx >= 0) openByFilteredIdx(currentIdx);
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); moveCursor(-1); }
  if (e.key === 'Enter' && currentIdx >= 0) openByFilteredIdx(currentIdx);
  if (e.key === '/') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'd' && currentIdx >= 0) deleteFile();
});

function moveCursor(dir) {
  if (filteredFiles.length === 0) return;
  currentIdx = Math.max(0, Math.min(filteredFiles.length - 1, currentIdx + dir));
  openByFilteredIdx(currentIdx);
}

init();
</script>
</body>
</html>
